<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAF1"/>
    </linearGradient>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7DB94D"/>
      <stop offset="100%" stop-color="#A5D549"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="450" fill="url(#bg)"/>

  <!-- Left Accent -->
  <rect x="70" y="70" width="8" height="310" rx="4" fill="#7DB94D"/>

  <!-- Small Label -->
  <text x="110"
        y="95"
        font-family="Poppins, Arial, sans-serif"
        font-size="20"
        font-weight="700"
        letter-spacing="3"
        fill="#7DB94D">
    EUROPE • SCHENGEN VISA
  </text>

  <!-- Main Heading -->
  <text x="110"
        y="175"
        font-family="Poppins, Arial, sans-serif"
        font-size="64"
        font-weight="700"
        fill="#000080">
    Scandinavian
  </text>

  <text x="110"
        y="245"
        font-family="Poppins, Arial, sans-serif"
        font-size="64"
        font-weight="700"
        fill="#000080">
    Countries
  </text>

  <!-- Green Line -->
  <rect x="110"
        y="270"
        width="240"
        height="6"
        rx="3"
        fill="url(#line)"/>

  <!-- Subtitle -->
  <text x="110"
        y="325"
        font-family="Poppins, Arial, sans-serif"
        font-size="30"
        font-weight="600"
        fill="#444444">
    Visa Guide 2026
  </text>

  <!-- Countries -->
  <text x="110"
        y="370"
        font-family="Poppins, Arial, sans-serif"
        font-size="22"
        fill="#666666">
    Norway • Sweden • Denmark • Finland • Iceland
  </text>

  <!-- Right Side Badge -->
  <g transform="translate(980 105)">
    <rect width="260" height="220" rx="20" fill="#FFFFFF" stroke="#7DB94D" stroke-width="3"/>

    <text x="130"
          y="70"
          text-anchor="middle"
          font-family="Poppins, Arial"
          font-size="22"
          font-weight="700"
          fill="#000080">
      SCHENGEN
    </text>

    <text x="130"
          y="108"
          text-anchor="middle"
          font-family="Poppins, Arial"
          font-size="36"
          font-weight="700"
          fill="#7DB94D">
      VISA
    </text>

    <line x1="55" y1="130" x2="205" y2="130"
          stroke="#A5D549"
          stroke-width="3"/>

    <text x="130"
          y="170"
          text-anchor="middle"
          font-family="Poppins, Arial"
          font-size="18"
          fill="#555555">
      Complete Travel Guide
    </text>

    <text x="130"
          y="198"
          text-anchor="middle"
          font-family="Poppins, Arial"
          font-size="18"
          fill="#555555">
      Requirements • Tips
    </text>
  </g>

  <!-- Bottom Strip -->
  <rect x="0" y="420" width="1400" height="30" fill="#7DB94D"/>

  <text x="700"
        y="440"
        text-anchor="middle"
        font-family="Poppins, Arial"
        font-size="16"
        font-weight="600"
        fill="#FFFFFF">
    MY VISA ASSISTANCE • Trusted Schengen Visa Support
  </text>

</svg>