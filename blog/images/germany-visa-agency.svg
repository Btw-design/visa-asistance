<svg xmlns="http://www.w3.org/2000/svg" width="1980" height="1080" viewBox="0 0 1980 1080">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DD0000"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1980" height="1080" fill="url(#bg)"/>

  <!-- German Flag Accent Stripes (thin top) -->
  <rect x="0" y="0" width="1980" height="12" fill="#000000"/>
  <rect x="0" y="12" width="1980" height="12" fill="#DD0000"/>
  <rect x="0" y="24" width="1980" height="12" fill="#FFD700"/>

  <!-- Large Typography -->
  <text x="180"
        y="340"
        font-family="DM Sans, Arial, sans-serif"
        font-size="140"
        font-weight="700"
        fill="#FFFFFF">
    Germany
  </text>

  <text x="180"
        y="490"
        font-family="DM Sans, Arial, sans-serif"
        font-size="140"
        font-weight="700"
        fill="#FFFFFF">
    Visa
  </text>

  <text x="180"
        y="610"
        font-family="DM Sans, Arial, sans-serif"
        font-size="76"
        font-weight="600"
        fill="#FFD700">
    Agency
  </text>

  <!-- Accent Line -->
  <rect x="180"
        y="660"
        width="460"
        height="10"
        rx="5"
        fill="#FFFFFF"/>

  <!-- Description -->
  <text x="180"
        y="775"
        font-family="DM Sans, Arial, sans-serif"
        font-size="42"
        fill="#FFE0E0">
    Expert guidance for German visas
  </text>

  <text x="180"
        y="835"
        font-family="DM Sans, Arial, sans-serif"
        font-size="42"
        fill="#FFE0E0">
    &mdash; tourist, business, student &amp; more.
  </text>

  <!-- Right Side Typography -->
  <text x="1420"
        y="250"
        font-family="DM Sans, Arial, sans-serif"
        font-size="32"
        font-weight="700"
        letter-spacing="8"
        fill="#FFD700">
    SCHENGEN
  </text>

  <text x="1420"
        y="420"
        font-family="DM Sans, Arial, sans-serif"
        font-size="320"
        font-weight="800"
        fill="#FFFFFF"
        opacity="0.08">
    DE
  </text>

  <text x="1420"
        y="560"
        font-family="DM Sans, Arial, sans-serif"
        font-size="66"
        font-weight="700"
        fill="#FFFFFF">
    EUROPE'S
  </text>

  <text x="1420"
        y="630"
        font-family="DM Sans, Arial, sans-serif"
        font-size="66"
        font-weight="700"
        fill="#FFFFFF">
