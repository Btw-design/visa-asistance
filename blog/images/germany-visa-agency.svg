  </text>

  <!-- Bottom Feature Strip -->
  <rect x="180"
        y="930"
        width="1620"
        height="1.5"
        fill="#FFFFFF"
        opacity="0.18"/>

  <text x="180"
        y="995"
        font-family="DM Sans, Arial, sans-serif"
        font-size="30"
        font-weight="600"
        fill="#FFD700">
    VISA APPLICATION ASSISTANCE
  </text>

  <text x="760"
        y="995"
        font-family="DM Sans, Arial, sans-serif"
        font-size="30"
        font-weight="600"
        fill="#FFFFFF">
