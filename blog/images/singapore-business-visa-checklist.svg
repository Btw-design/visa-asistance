<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sgBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#031B30"/>
      <stop offset="50%" stop-color="#031B30"/>
      <stop offset="100%" stop-color="#031B30"/>
    </linearGradient>
    <linearGradient id="sgAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5057EA"/>
      <stop offset="100%" stop-color="#3a41c8"/>
    </linearGradient>
    <linearGradient id="sgGreenAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A5D549"/>
      <stop offset="100%" stop-color="#8cba30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#sgBg)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="180" r="350" fill="rgba(80, 87, 234,0.06)"/>
  <circle cx="200" cy="480" r="200" fill="rgba(80, 87, 234,0.05)"/>

  <!-- Singapore skyline silhouette -->
  <g transform="translate(0, 370)" opacity="0.15">
    <rect x="100" y="40" width="40" height="120" rx="2" fill="white"/>
    <rect x="160" y="20" width="35" height="140" rx="2" fill="white"/>
    <rect x="210" y="60" width="45" height="100" rx="2" fill="white"/>
    <rect x="280" y="10" width="30" height="150" rx="2" fill="white"/>
    <rect x="330" y="50" width="40" height="110" rx="2" fill="white"/>
    <rect x="390" y="30" width="50" height="130" rx="2" fill="white"/>
    <rect x="460" y="0" width="35" height="160" rx="2" fill="white"/>
    <rect x="510" y="45" width="40" height="115" rx="2" fill="white"/>
    <rect x="570" y="55" width="45" height="105" rx="2" fill="white"/>
    <rect x="640" y="25" width="35" height="135" rx="2" fill="white"/>
    <rect x="690" y="60" width="40" height="100" rx="2" fill="white"/>
    <rect x="750" y="35" width="50" height="125" rx="2" fill="white"/>
    <rect x="820" y="15" width="35" height="145" rx="2" fill="white"/>
    <rect x="870" y="50" width="40" height="110" rx="2" fill="white"/>
    <rect x="930" y="30" width="45" height="130" rx="2" fill="white"/>
    <rect x="1000" y="55" width="35" height="105" rx="2" fill="white"/>
  </g>

  <!-- Merlion icon -->
  <g transform="translate(90, 100)">
    <path d="M0,0 Q40,-60 80,-20 Q100,0 80,40 Q60,80 20,70 Q-10,60 0,20 Z" fill="rgba(80, 87, 234,0.2)"/>
    <path d="M30,10 Q55,-20 75,5 Q85,15 75,30 Q65,50 35,45 Q15,40 20,20 Z" fill="rgba(80, 87, 234,0.35)"/>
  </g>

  <!-- Main title -->
  <text x="600" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="white" letter-spacing="-1">
    Singapore Business Visa &amp; Tourist
  </text>
  <text x="600" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#5057EA" letter-spacing="-1">
    Visa Checklist 2026
  </text>

  <!-- Subtitle -->
  <text x="600" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)" letter-spacing="0.5">
    Complete Document Requirements for Indian Citizens
  </text>

  <!-- Divider -->
  <rect x="450" y="285" width="300" height="3" rx="1.5" fill="url(#sgAccent)"/>

  <!-- Key info badges - Tourist -->
  <g transform="translate(0, 310)">
    <rect x="140" y="0" width="280" height="40" rx="20" fill="rgba(80, 87, 234,0.15)" stroke="rgba(80, 87, 234,0.3)" stroke-width="1"/>
    <text x="280" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#5057EA">&#10003; Tourist: Passport + Form 14A</text>

    <rect x="440" y="0" width="220" height="40" rx="20" fill="rgba(80, 87, 234,0.15)" stroke="rgba(80, 87, 234,0.3)" stroke-width="1"/>
    <text x="550" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#5057EA">&#10003; 3-5 Working Days</text>

    <rect x="680" y="0" width="280" height="40" rx="20" fill="rgba(165, 213, 73,0.15)" stroke="rgba(165, 213, 73,0.3)" stroke-width="1"/>
    <text x="820" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#A5D549">&#10003; Business: + V-39 + Invitation</text>
  </g>

  <!-- Checklist items column left -->
  <g transform="translate(100, 380)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#A5D549">TOURIST VISA</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; Passport (6 mo validity)</text>
    <text x="0" y="47" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; 2 passport-size photos</text>
    <text x="0" y="69" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; Form 14A (signed)</text>
    <text x="0" y="91" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; Cover letter</text>
    <text x="0" y="113" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; Bank statement (&#8377;80K+)</text>
    <text x="0" y="135" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; Block air ticket + hotel</text>
  </g>

  <!-- Checklist items column right -->
  <g transform="translate(500, 380)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#5057EA">BUSINESS VISA</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; All Tourist documents +</text>
    <text x="0" y="47" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; V-39 Form (Local Contact)</text>
    <text x="0" y="69" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; Invitation letter (Singapore co.)</text>
    <text x="0" y="91" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; Company letter (Indian employer)</text>
    <text x="0" y="113" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; Business registration proof</text>
    <text x="0" y="135" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">&#10003; ICA processing fee: SGD 30</text>
  </g>

  <!-- Logo / Brand -->
  <g transform="translate(0, 555)">
    <rect x="450" y="0" width="300" height="1" fill="rgba(255,255,255,0.2)"/>
    <text x="600" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.7)">
      My Visa <tspan fill="#5057EA">Assistance</tspan>
    </text>
  </g>

  <!-- Singapore flag colors accent bar at bottom -->
  <rect x="0" y="620" width="1200" height="10" fill="#ED2939"/>
  <rect x="0" y="620" width="1200" height="5" fill="white" opacity="0.3"/>
</svg>
