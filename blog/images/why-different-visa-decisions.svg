<svg xmlns="http://www.w3.org/2000/svg" width="1980" height="1080" viewBox="0 0 1980 1080">

  <defs>

    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5057EA"/>
      <stop offset="100%" stop-color="#343DD6"/>
    </linearGradient>

    <linearGradient id="green" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#A5D549"/>
      <stop offset="100%" stop-color="#7CC63F"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-opacity=".12"/>
    </filter>

  </defs>

  <!-- Background -->

  <rect width="1980" height="1080" fill="#F7F9FC"/>

  <circle cx="1820" cy="140" r="180" fill="#5057EA" opacity=".05"/>
  <circle cx="180" cy="930" r="190" fill="#A5D549" opacity=".08"/>

  <!-- Left Content -->

  <text x="150"
        y="150"
        font-family="Arial"
        font-size="34"
        font-weight="700"
        fill="#E86020"
        letter-spacing="5">

        VISA FACTS

  </text>

  <text x="150"
        y="280"
        font-family="Arial"
        font-size="88"
        font-weight="800"
        fill="#5057EA">

        SAME PROFILE

  </text>

  <text x="150"
        y="405"
        font-family="Arial"
        font-size="128"
        font-weight="900"
        fill="url(#green)">

        DIFFERENT

  </text>

  <text x="150"
        y="515"
        font-family="Arial"
        font-size="92"
        font-weight="800"
        fill="#5057EA">

        DECISION

  </text>

  <text x="150"
        y="640"
        font-family="Arial"
        font-size="34"
        fill="#687384">

        Visa decisions are based on the complete

  </text>

  <text x="150"
        y="690"
        font-family="Arial"
        font-size="34"
        fill="#687384">

        assessment of each individual application.

  </text>

  <!-- Right Card -->

  <g filter="url(#shadow)">
    <rect x="1030"
          y="120"
          width="760"
          height="820"
          rx="40"
          fill="#FFFFFF"/>
  </g>

  <!-- Split -->

  <line x1="1410"
        y1="180"
        x2="1410"
        y2="880"
        stroke="#E2E7F5"
        stroke-width="4"/>

  <!-- Applicant A -->

  <circle cx="1220" cy="250" r="52" fill="url(#primary)"/>

  <circle cx="1220" cy="232" r="18" fill="#FFFFFF"/>

  <path d="M1192 274Q1220 248 1248 274V292H1192Z" fill="#FFFFFF"/>

  <text x="1220"
        y="350"
        text-anchor="middle"
        font-family="Arial"
        font-size="30"
        font-weight="700"
        fill="#5057EA">

        Applicant A

  </text>

  <!-- Applicant B -->

  <circle cx="1600" cy="250" r="52" fill="url(#primary)"/>

  <circle cx="1600" cy="232" r="18" fill="#FFFFFF"/>

  <path d="M1572 274Q1600 248 1628 274V292H1572Z" fill="#FFFFFF"/>

  <text x="1600"
        y="350"
        text-anchor="middle"
        font-family="Arial"
        font-size="30"
        font-weight="700"
        fill="#5057EA">

        Applicant B

  </text>

  <!-- Equal Sign -->

  <text x="1410"
        y="365"
        text-anchor="middle"
        font-family="Arial"
        font-size="70"
        font-weight="900"
        fill="#5057EA">

        =

  </text>

  <!-- Similar Labels -->

  <text x="1220" y="455"
        text-anchor="middle"
        font-family="Arial"
        font-size="28"
        fill="#666">
        Income
  </text>

  <text x="1600" y="455"
        text-anchor="middle"
        font-family="Arial"
        font-size="28"
        fill="#666">
        Income
  </text>

  <text x="1220" y="520"
        text-anchor="middle"
        font-family="Arial"
        font-size="28"
        fill="#666">
        Travel History
  </text>

  <text x="1600" y="520"
        text-anchor="middle"
        font-family="Arial"
        font-size="28"
        fill="#666">
        Travel History
  </text>

  <text x="1220" y="585"
        text-anchor="middle"
        font-family="Arial"
        font-size="28"
        fill="#666">
        Documents
  </text>

  <text x="1600" y="585"
        text-anchor="middle"
        font-family="Arial"
        font-size="28"
        fill="#666">
        Documents
  </text>

  <!-- Decisions -->

  <circle cx="1220" cy="760" r="56" fill="#A5D549"/>

  <path d="M1198 760L1215 777L1246 742"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <text x="1220"
        y="850"
        text-anchor="middle"
        font-family="Arial"
        font-size="30"
        font-weight="700"
        fill="#5057EA">
        Approved
  </text>

  <circle cx="1600" cy="760" r="56" fill="#E86020"/>

  <line x1="1576"
        y1="736"
        x2="1624"
        y2="784"
        stroke="#FFFFFF"
        stroke-width="9"
        stroke-linecap="round"/>

  <line x1="1624"
        y1="736"
        x2="1576"
        y2="784"
        stroke="#FFFFFF"
        stroke-width="9"
        stroke-linecap="round"/>

  <text x="1600"
        y="850"
        text-anchor="middle"
        font-family="Arial"
        font-size="30"
        font-weight="700"
        fill="#5057EA">
        Refused
  </text>

  <!-- Question Badge -->

  <circle cx="915"
          cy="530"
          r="65"
          fill="url(#primary)"/>

  <text x="915"
        y="553"
        text-anchor="middle"
        font-family="Arial"
        font-size="72"
        font-weight="900"
        fill="#FFFFFF">
        ?
  </text>

</svg>
