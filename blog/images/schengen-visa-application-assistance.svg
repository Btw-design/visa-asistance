    <rect x="0" y="0" width="120" height="160" rx="8" fill="#1a3a5c" stroke="#5057EA" stroke-width="3"/>
    <rect x="8" y="12" width="104" height="20" rx="3" fill="#0a2a4a"/>
    <text x="60" y="27" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFD700">SCHENGEN</text>
    <circle cx="60" cy="85" r="20" fill="#5057EA" opacity="0.3"/>
    <circle cx="60" cy="85" r="12" fill="#5057EA" opacity="0.5"/>
    <line x1="42" y1="130" x2="78" y2="130" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <line x1="42" y1="140" x2="70" y2="140" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Stars (EU flag style) -->
  <g transform="translate(240, 150)">
    <polygon points="15,0 19,10 30,10 21,16 25,26 15,20 5,26 9,16 0,10 11,10" fill="#FFD700" opacity="0.6"/>
    <polygon points="55,-5 58,3 66,3 60,8 62,16 55,11 48,16 50,8 44,3 52,3" fill="#FFD700" opacity="0.4"/>
    <polygon points="30,35 33,43 41,43 35,48 37,56 30,51 23,56 25,48 19,43 27,43" fill="#FFD700" opacity="0.5"/>
