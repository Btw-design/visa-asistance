  </text>

  <!-- Right side decorative elements -->
  <g transform="translate(900, 300)">
    <rect x="0" y="-80" width="100" height="160" rx="12" fill="none" stroke="#5057EA" stroke-width="2" opacity="0.3"/>
    <rect x="15" y="-65" width="70" height="130" rx="8" fill="none" stroke="#5057EA" stroke-width="1.5" opacity="0.2"/>
    <!-- Checkmarks -->
    <polyline points="30,-20 45,-5 70,-35" fill="none" stroke="#A5D549" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <polyline points="30,10 45,25 70,-5" fill="none" stroke="#A5D549" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>
</svg>
