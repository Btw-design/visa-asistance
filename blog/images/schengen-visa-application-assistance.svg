<svg xmlns="http://www.w3.org/2000/svg" width="1980" height="1080" viewBox="0 0 1980 1080">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5057EA"/>
      <stop offset="100%" stop-color="#3C43D8"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#E86020"/>
      <stop offset="100%" stop-color="#FF9858"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1980" height="1080" fill="url(#bg)"/>

  <!-- Large Typography -->
  <text x="180"
        y="370"
        font-family="DM Sans, Arial, sans-serif"
        font-size="150"
        font-weight="700"
        fill="#FFFFFF">
    Schengen
  </text>

  <text x="180"
        y="520"
        font-family="DM Sans, Arial, sans-serif"
        font-size="150"
        font-weight="700"
        fill="#FFFFFF">
    Visa
  </text>

  <text x="180"
        y="635"
        font-family="DM Sans, Arial, sans-serif"
        font-size="72"
        font-weight="600"
        fill="#E86020">
    Application Assistance
  </text>

  <!-- Accent Line -->
  <rect x="180"
        y="680"
        width="460"
        height="10"
        rx="5"
        fill="#A5D549"/>

  <!-- Description -->
  <text x="180"
        y="790"
        font-family="DM Sans, Arial, sans-serif"
        font-size="42"
        fill="#EEF1FF">
    Fast, accurate and professional guidance
  </text>

  <text x="180"
        y="850"
        font-family="DM Sans, Arial, sans-serif"
        font-size="42"
        fill="#EEF1FF">
    for your European travel visa application.
  </text>

  <!-- Right Side Typography -->
  <text x="1420"
        y="250"
        font-family="DM Sans, Arial, sans-serif"
        font-size="32"
        font-weight="700"
        letter-spacing="8"
        fill="#A5D549">
    EUROPE
  </text>

  <text x="1420"
        y="420"
        font-family="DM Sans, Arial, sans-serif"
        font-size="320"
        font-weight="800"
        fill="#FFFFFF"
        opacity="0.08">
    29
  </text>

  <text x="1420"
        y="560"
        font-family="DM Sans, Arial, sans-serif"
        font-size="70"
        font-weight="700"
        fill="#FFFFFF">
    COUNTRIES
  </text>

  <text x="1420"
        y="640"
        font-family="DM Sans, Arial, sans-serif"
        font-size="34"
        fill="#E9ECFF">
    ONE VISA
  </text>

  <text x="1420"
        y="690"
        font-family="DM Sans, Arial, sans-serif"
        font-size="34"
        fill="#E9ECFF">
    MULTIPLE DESTINATIONS
  </text>

  <!-- Bottom Feature Strip -->
  <rect x="180"
        y="930"
        width="1620"
        height="1.5"
        fill="#FFFFFF"
        opacity="0.18"/>

  <text x="180"
        y="995"
        font-family="DM Sans, Arial, sans-serif"
        font-size="30"
        font-weight="600"
        fill="#FFFFFF">
    DOCUMENT REVIEW
  </text>

  <text x="760"
        y="995"
        font-family="DM Sans, Arial, sans-serif"
        font-size="30"
        font-weight="600"
        fill="#A5D549">
    APPOINTMENT ASSISTANCE
  </text>

  <text x="1410"
        y="995"
        font-family="DM Sans, Arial, sans-serif"
        font-size="30"
        font-weight="600"
        fill="#E86020">
    SUBMISSION SUPPORT
  </text>

</svg>
