  <!-- Decorative line -->
  <line x1="420" y1="430" x2="800" y2="430" stroke="#5057EA" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Bottom text -->
  <text x="420" y="480" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" font-weight="400">
