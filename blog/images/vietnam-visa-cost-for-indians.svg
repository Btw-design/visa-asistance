<svg xmlns="http://www.w3.org/2000/svg" width="1980" height="1080" viewBox="0 0 1980 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5057EA"/>
      <stop offset="100%" stop-color="#3942D8"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E86020"/>
      <stop offset="100%" stop-color="#FF985A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1980" height="1080" fill="url(#bg)"/>

  <!-- Decorative -->
  <circle cx="1730" cy="170" r="210" fill="#A5D549" opacity=".10"/>
  <circle cx="1780" cy="880" r="270" fill="#FFFFFF" opacity=".05"/>
  <circle cx="180" cy="930" r="180" fill="#E86020" opacity=".08"/>

  <!-- Left Content -->
  <text x="170"
        y="180"
        font-family="DM Sans,Arial,sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="5"
        fill="#A5D549">
    2026 GUIDE
  </text>

  <text x="170"
        y="380"
        font-family="DM Sans,Arial,sans-serif"
        font-size="122"
        font-weight="700"
        fill="#FFFFFF">
    Vietnam Visa
  </text>

  <text x="170"
        y="505"
        font-family="DM Sans,Arial,sans-serif"
        font-size="122"
        font-weight="700"
        fill="#FFFFFF">
    Cost
  </text>

  <text x="170"
        y="620"
        font-family="DM Sans,Arial,sans-serif"
        font-size="66"
        font-weight="700"
        fill="#E86020">
    for Indian Passport Holders
  </text>

  <rect x="170"
        y="660"
        width="520"
        height="8"
        rx="4"
        fill="#A5D549"/>

  <text x="170"
        y="760"
        font-family="DM Sans,Arial,sans-serif"
        font-size="40"
        fill="#EEF1FF">
    Official Government Fees
  </text>

  <text x="170"
        y="815"
        font-family="DM Sans,Arial,sans-serif"
        font-size="40"
        fill="#EEF1FF">
    Processing Time & Application Guide
  </text>

  <!-- Right Pricing Card -->
  <rect x="1200"
        y="180"
        width="600"
        height="720"
        rx="36"
        fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="1200"
        y="180"
        width="600"
        height="110"
        rx="36"
        fill="url(#accent)"/>

  <text x="1500"
        y="250"
        text-anchor="middle"
        font-family="DM Sans,Arial,sans-serif"
        font-size="44"
        font-weight="700"
        fill="#FFFFFF">
    E-VISA FEES
  </text>

  <!-- Single Entry -->
  <text x="1280"
        y="390"
        font-family="DM Sans,Arial,sans-serif"
        font-size="34"
        font-weight="600"
        fill="#5057EA">
    SINGLE ENTRY
  </text>

  <text x="1280"
        y="490"
        font-family="DM Sans,Arial,sans-serif"
        font-size="92"
        font-weight="700"
        fill="#E86020">
    US$25
  </text>

  <!-- Divider -->
  <rect x="1260"
        y="555"
        width="480"
        height="2"
        fill="#E7E9FF"/>

  <!-- Multiple Entry -->
  <text x="1280"
        y="650"
        font-family="DM Sans,Arial,sans-serif"
        font-size="34"
        font-weight="600"
        fill="#5057EA">
    MULTIPLE ENTRY
  </text>

  <text x="1280"
        y="750"
        font-family="DM Sans,Arial,sans-serif"
        font-size="92"
        font-weight="700"
        fill="#E86020">
    US$50
  </text>

  <!-- Bottom -->
  <rect x="1260"
        y="805"
        width="480"
        height="70"
        rx="35"
        fill="#EEF2FF"/>

  <text x="1500"
        y="850"
        text-anchor="middle"
        font-family="DM Sans,Arial,sans-serif"
        font-size="28"
        font-weight="700"
        fill="#5057EA">
    Processing: ~3 Working Days
  </text>

  <!-- Bottom Strip -->
  <rect x="170"
        y="960"
        width="1610"
        height="2"
        fill="#FFFFFF"
        opacity=".18"/>

  <text x="170"
        y="1015"
        font-family="DM Sans,Arial,sans-serif"
        font-size="28"
        font-weight="600"
        fill="#FFFFFF">
    OFFICIAL FEES
  </text>

  <text x="760"
        y="1015"
        font-family="DM Sans,Arial,sans-serif"
        font-size="28"
        font-weight="600"
        fill="#A5D549">
    ONLINE APPLICATION
  </text>

  <text x="1390"
        y="1015"
        font-family="DM Sans,Arial,sans-serif"
        font-size="28"
        font-weight="600"
        fill="#E86020">
    UPDATED 2026
  </text>

</svg>
