<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#031B30"/>
      <stop offset="50%" stop-color="#0a2a4a"/>
      <stop offset="100%" stop-color="#031B30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5057EA"/>
      <stop offset="100%" stop-color="#6b72ee"/>
    </linearGradient>
    <linearGradient id="alt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5D549"/>
      <stop offset="100%" stop-color="#8cba30"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="550" r="300" fill="#5057EA" opacity="0.05"/>
  <circle cx="1100" cy="80" r="250" fill="#A5D549" opacity="0.04"/>
  <circle cx="600" cy="315" r="400" fill="#ffffff" opacity="0.02"/>

  <!-- Subtle star dots -->
  <g fill="#ffffff" opacity="0.15">
    <circle cx="50" cy="50" r="2"/>
    <circle cx="150" cy="120" r="1.5"/>
    <circle cx="250" cy="40" r="1.8"/>
    <circle cx="380" cy="80" r="1.2"/>
    <circle cx="500" cy="30" r="2"/>
    <circle cx="650" cy="60" r="1.5"/>
    <circle cx="800" cy="45" r="1.8"/>
    <circle cx="950" cy="90" r="1.3"/>
    <circle cx="1050" cy="35" r="2"/>
    <circle cx="1150" cy="110" r="1.5"/>
    <circle cx="80" cy="200" r="1.2"/>
    <circle cx="200" cy="180" r="1.6"/>
    <circle cx="450" cy="150" r="1.4"/>
    <circle cx="700" cy="130" r="1.8"/>
    <circle cx="900" cy="170" r="1.2"/>
    <circle cx="100" cy="400" r="1.5"/>
    <circle cx="350" cy="450" r="1.3"/>
    <circle cx="750" cy="500" r="1.6"/>
    <circle cx="1000" cy="420" r="1.4"/>
    <circle cx="1120" cy="480" r="1.2"/>
  </g>

  <!-- Left icon: Handshake / consultant -->
  <g transform="translate(70, 140)">
    <!-- Circle background -->
    <circle cx="65" cy="80" r="55" fill="none" stroke="#5057EA" stroke-width="2" opacity="0.4"/>
    <!-- Person icon -->
    <circle cx="65" cy="55" r="14" fill="#A5D549"/>
    <path d="M35,110 Q65,95 95,110" fill="none" stroke="#A5D549" stroke-width="5" stroke-linecap="round"/>
    <!-- Document / checkmark -->
    <rect x="45" y="130" width="22" height="28" rx="3" fill="none" stroke="#5057EA" stroke-width="2" opacity="0.6"/>
    <polyline points="50,143 53,146 60,138" fill="none" stroke="#A5D549" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Stars decoration -->
  <g transform="translate(220, 150)">
    <polygon points="15,0 18,8 26,8 20,13 22,21 15,16 8,21 10,13 4,8 12,8" fill="#A5D549" opacity="0.5"/>
    <polygon points="45,-5 48,3 56,3 50,8 52,16 45,11 38,16 40,8 34,3 42,3" fill="#A5D549" opacity="0.3"/>
  </g>

  <!-- Main title -->
  <text x="400" y="220" font-family="Arial,sans-serif" font-size="28" font-weight="800" fill="#ffffff">
    TOURIST VISA
  </text>
  <text x="400" y="275" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="url(#accent)">
    CONSULTANT
