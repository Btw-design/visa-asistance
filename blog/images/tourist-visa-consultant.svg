<svg xmlns="http://www.w3.org/2000/svg" width="1980" height="1080" viewBox="0 0 1980 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5057EA"/>
      <stop offset="100%" stop-color="#3942D8"/>
    </linearGradient>

    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F6F8FF"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A5D549"/>
      <stop offset="100%" stop-color="#E86020"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1980" height="1080" fill="url(#bg)"/>

  <!-- Decorative -->
  <circle cx="1700" cy="180" r="170" fill="#FFFFFF" opacity=".05"/>
  <circle cx="1830" cy="860" r="260" fill="#A5D549" opacity=".08"/>
  <circle cx="150" cy="900" r="240" fill="#E86020" opacity=".08"/>

  <!-- Accent -->
  <rect x="150" y="250" width="12" height="500" rx="6" fill="#A5D549"/>

  <!-- Heading -->
  <text x="220"
        y="430"
        font-family="DM Sans,Arial,sans-serif"
        font-size="150"
        font-weight="700"
        fill="#FFFFFF">
    Tourist Visa
  </text>

  <text x="220"
        y="595"
        font-family="DM Sans,Arial,sans-serif"
        font-size="150"
        font-weight="700"
        fill="#A5D549">
    Consultant
  </text>

  <text x="220"
        y="710"
        font-family="DM Sans,Arial,sans-serif"
        font-size="48"
        fill="#EAF0FF">
    Fast • Reliable • Professional Visa Assistance
  </text>

  <rect x="220" y="790" width="520" height="8" rx="4" fill="#E86020"/>

  <!-- Right Card -->
  <g filter="url(#shadow)">
    <rect x="1320" y="170" width="430" height="700" rx="40" fill="url(#card)"/>
  </g>

  <!-- Passport -->
  <rect x="1425" y="255" width="220" height="320" rx="22" fill="#5057EA"/>

  <!-- Passport Globe -->
  <circle cx="1535" cy="390" r="58" fill="none" stroke="#FFFFFF" stroke-width="6"/>
  <line x1="1478" y1="390" x2="1592" y2="390" stroke="#FFFFFF" stroke-width="6"/>
  <ellipse cx="1535" cy="390" rx="22" ry="58" fill="none" stroke="#FFFFFF" stroke-width="6"/>
  <path d="M1490 355 Q1535 375 1580 355" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <path d="M1490 425 Q1535 405 1580 425" fill="none" stroke="#FFFFFF" stroke-width="5"/>

  <!-- Visa Stamp -->
  <g transform="translate(1395 620) rotate(-10)">
    <circle cx="120" cy="70" r="62" fill="none" stroke="#E86020" stroke-width="10"/>
    <text x="120"
          y="82"
          text-anchor="middle"
          font-family="DM Sans,Arial,sans-serif"
          font-size="30"
          font-weight="700"
          fill="#E86020">
      VISA
    </text>
  </g>

  <!-- Check Badge -->
  <circle cx="1670" cy="700" r="46" fill="#A5D549"/>
  <path d="M1648 700 L1664 716 L1694 682"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

</svg>
