  <text x="400" y="370" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" font-weight="400">
    Services &bull; Costs &bull; Selection Tips &bull; Red Flags
  </text>

  <!-- Info pills -->
  <g transform="translate(400, 410)">
    <rect x="0" y="0" width="130" height="34" rx="17" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">&#128188; Expert Guidance</text>
    
    <rect x="145" y="0" width="140" height="34" rx="17" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="215" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">&#128203; End-to-End Help</text>
    
    <rect x="300" y="0" width="140" height="34" rx="17" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="370" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">&#9989; Higher Success Rate</text>
  </g>

  <!-- Decorative line -->
  <line x1="400" y1="470" x2="780" y2="470" stroke="#A5D549" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Bottom text -->
  <text x="400" y="520" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" font-weight="400">
    2026 Guide &bull; US &bull; UK &bull; Schengen &bull; Canada &bull; Australia &bull; Japan &amp; More
  </text>

  <!-- myvisaassistance.com watermark -->
  <text x="600" y="590" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.2)" font-weight="600" letter-spacing="3">
    MYVISAASSISTANCE.COM
  </text>

  <!-- Right side decorative elements -->
  <g transform="translate(920, 280)">
    <rect x="0" y="-60" width="90" height="160" rx="12" fill="none" stroke="#5057EA" stroke-width="2" opacity="0.3"/>
    <rect x="12" y="-45" width="66" height="130" rx="8" fill="none" stroke="#A5D549" stroke-width="1.5" opacity="0.2"/>
    <!-- Checkmarks -->
    <polyline points="25,-15 38,0 60,-25" fill="none" stroke="#A5D549" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <polyline points="25,10 38,25 60,0" fill="none" stroke="#A5D549" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <polyline points="25,35 38,50 60,25" fill="none" stroke="#A5D549" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>
</svg>
