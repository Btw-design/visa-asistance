        SINGAPORE VISA
  </text>

  <!-- Heading -->

  <text x="140"
        y="260"
        font-family="Arial"
        font-size="66"
        font-weight="700"
        fill="#5057EA">
        WHY DO SOME
  </text>

  <text x="140"
        y="345"
        font-family="Arial"
        font-size="66"
        font-weight="700"
        fill="#5057EA">
        TRAVELERS RECEIVE A
  </text>

  <text x="140"
        y="475"
        font-family="Arial"
        font-size="128"
        font-weight="900"
