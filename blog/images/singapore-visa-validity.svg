  </text>

  <text x="140"
        y="675"
        font-family="Arial"
        font-size="40"
        font-weight="700"
        fill="#8B8B8B">
        while others receive a
  </text>

  <text x="140"
        y="805"
        font-family="Arial"
        font-size="128"
        font-weight="900"
