<svg xmlns="http://www.w3.org/2000/svg" width="1980" height="1080" viewBox="0 0 1980 1080">

  <defs>

    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5057EA"/>
      <stop offset="100%" stop-color="#3D46D8"/>
    </linearGradient>

    <linearGradient id="g2" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#A5D549"/>
      <stop offset="100%" stop-color="#7BC63E"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-opacity=".12"/>
    </filter>

  </defs>

  <!-- Background -->

  <rect width="1980" height="1080" fill="#F8FAFD"/>

  <!-- Decorative Shapes -->

  <circle cx="1800" cy="170" r="180" fill="#5057EA" opacity=".05"/>
  <circle cx="180" cy="900" r="180" fill="#A5D549" opacity=".08"/>

  <!-- Small Label -->

  <rect x="140" y="110"
